version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: moderation_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: moderation_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/moderation
      - JWT_SECRET=super_secret_owasp_hardened_key_123!
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: moderation_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: